<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <linearGradient id="userBubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#ff8c42"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a"/>
      <stop offset="100%" style="stop-color:#262626"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <style>
    .bg-outer { fill: #1a1a1a; }
    .bg-header { fill: url(#headerGrad); }
    .bg-chat { fill: #1e1e1e; }
    .bg-input { fill: #262626; }
    .text-primary { fill: #fafafa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .text-secondary { fill: #9ca3af; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .text-white { fill: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .text-ai { fill: #90caf9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .text-action { fill: #81c784; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .text-system { fill: #d1d5db; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .text-placeholder { fill: #6b7280; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .bubble-system { fill: #374151; }
    .bubble-ai { fill: rgba(33,150,243,0.1); }
    .bubble-action { fill: rgba(76,175,80,0.08); }
    .bubble-status { fill: #1f2937; }
    .border-ai { fill: #2196f3; }
    .border-action { fill: #4caf50; }
    .status-dot { fill: #10b981; }
    .input-border { stroke: #374151; fill: none; }
    .send-btn { fill: #ff6b35; }
    .icon-color { fill: #9ca3af; }
    .separator { stroke: #374151; }
    .corner-radius { rx: 12; ry: 12; }

    @media (prefers-color-scheme: light) {
      .bg-outer { fill: #f3f4f6; }
      .bg-header { fill: #ffffff; }
      .bg-chat { fill: #f9fafb; }
      .bg-input { fill: #ffffff; }
      .text-primary { fill: #111827; }
      .text-secondary { fill: #6b7280; }
      .text-ai { fill: #1565c0; }
      .text-action { fill: #2e7d32; }
      .text-system { fill: #4b5563; }
      .text-placeholder { fill: #9ca3af; }
      .bubble-system { fill: #e5e7eb; }
      .bubble-ai { fill: rgba(33,150,243,0.08); }
      .bubble-action { fill: rgba(76,175,80,0.06); }
      .bubble-status { fill: #e5e7eb; }
      .input-border { stroke: #d1d5db; }
      .icon-color { fill: #6b7280; }
      .separator { stroke: #e5e7eb; }
    }
  </style>

  <!-- Outer background -->
  <rect width="800" height="520" rx="16" ry="16" class="bg-outer" filter="url(#shadow)"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="56" rx="16" ry="16" class="bg-header"/>
  <rect x="0" y="40" width="800" height="16" class="bg-header"/>

  <!-- Header content -->
  <text x="24" y="35" class="text-primary" font-size="18" font-weight="700">FSB</text>
  <circle cx="70" cy="30" r="4" class="status-dot"/>
  <text x="80" y="35" class="text-secondary" font-size="13">Ready</text>

  <!-- Header right icons (settings gear + menu) -->
  <circle cx="740" cy="28" r="14" fill="none" stroke="#4b5563" stroke-width="1.5"/>
  <path d="M735 28 a5 5 0 1 0 10 0 a5 5 0 1 0 -10 0" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
  <circle cx="740" cy="28" r="2" class="icon-color"/>

  <circle cx="772" cy="28" r="14" fill="none" stroke="#4b5563" stroke-width="1.5"/>
  <rect x="766" y="23" width="12" height="2" rx="1" class="icon-color"/>
  <rect x="766" y="27" width="12" height="2" rx="1" class="icon-color"/>
  <rect x="766" y="31" width="12" height="2" rx="1" class="icon-color"/>

  <!-- Separator -->
  <line x1="0" y1="56" x2="800" y2="56" class="separator" stroke-width="1"/>

  <!-- Chat area -->
  <rect x="0" y="56" width="800" height="400" class="bg-chat"/>

  <!-- Message 1: User message (right-aligned, orange bubble) -->
  <rect x="340" y="76" width="436" height="44" rx="18" ry="18" fill="url(#userBubbleGrad)"/>
  <text x="360" y="103" class="text-white" font-size="14">Search for the latest iPhone reviews on Google</text>

  <!-- Message 2: System message (left-aligned, gray bubble) -->
  <rect x="24" y="140" width="260" height="38" rx="18" ry="18" class="bubble-system"/>
  <text x="44" y="164" class="text-system" font-size="13">Starting automation session...</text>

  <!-- Message 3: AI message (left-aligned, blue left border) -->
  <rect x="24" y="198" width="520" height="54" rx="10" ry="10" class="bubble-ai"/>
  <rect x="24" y="198" width="3" height="54" rx="1.5" ry="1.5" class="border-ai"/>
  <text x="40" y="220" class="text-ai" font-size="13">I'll search Google for iPhone reviews. Let me</text>
  <text x="40" y="238" class="text-ai" font-size="13">navigate there first.</text>

  <!-- Message 4: Action message (left-aligned, green left border) -->
  <rect x="24" y="272" width="480" height="54" rx="10" ry="10" class="bubble-action"/>
  <rect x="24" y="272" width="3" height="54" rx="1.5" ry="1.5" class="border-action"/>
  <text x="40" y="294" class="text-action" font-size="13">Navigated to google.com</text>
  <text x="40" y="312" class="text-action" font-size="13">Typing search query...</text>

  <!-- Message 5: Status/completion message (left-aligned, dark bubble) -->
  <rect x="24" y="346" width="380" height="44" rx="18" ry="18" class="bubble-status"/>
  <!-- Checkmark circle -->
  <circle cx="48" cy="368" r="10" fill="#10b981" opacity="0.2"/>
  <path d="M43 368 l3 3 l7 -7" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="66" y="373" class="text-system" font-size="13">Task completed -- Found 10 results</text>

  <!-- Separator above input -->
  <line x1="0" y1="456" x2="800" y2="456" class="separator" stroke-width="1"/>

  <!-- Input area -->
  <rect x="0" y="456" width="800" height="64" rx="0" ry="0" class="bg-input"/>
  <rect x="0" y="504" width="800" height="16" rx="16" ry="16" class="bg-input"/>

  <!-- Input field -->
  <rect x="20" y="470" width="704" height="38" rx="19" ry="19" class="input-border" stroke-width="1.5"/>
  <text x="44" y="494" class="text-placeholder" font-size="13">Ask me to automate something...</text>

  <!-- Send button -->
  <circle cx="752" cy="489" r="18" class="send-btn"/>
  <path d="M745 489 l14 0 m-5 -5 l5 5 l-5 5" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>