<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" width="900" height="480">
  <defs>
    <linearGradient id="cardGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="cardGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="cardGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="cardGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.05"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="chartFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow3">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <style>
    .db-outer { fill: #111827; }
    .db-sidebar { fill: #1f2937; }
    .db-main { fill: #111827; }
    .db-card { fill: #1f2937; }
    .db-text { fill: #f9fafb; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .db-text-dim { fill: #9ca3af; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .db-text-blue { fill: #60a5fa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .db-text-green { fill: #34d399; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .db-text-purple { fill: #a78bfa; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .db-text-amber { fill: #fbbf24; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .db-text-white { fill: #ffffff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .db-separator { stroke: #374151; }
    .db-nav-active { fill: #374151; }
    .db-nav-icon { fill: #9ca3af; }
    .db-nav-icon-active { fill: #f59e0b; }
    .db-chart-bg { fill: #1f2937; }
    .db-chart-grid { stroke: #374151; }
    .db-session-card { fill: #1f2937; }
    .db-badge-green { fill: #065f46; }
    .db-badge-red { fill: #7f1d1d; }
    .db-badge-green-text { fill: #34d399; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .db-badge-red-text { fill: #fca5a5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

    @media (prefers-color-scheme: light) {
      .db-outer { fill: #f3f4f6; }
      .db-sidebar { fill: #ffffff; }
      .db-main { fill: #f3f4f6; }
      .db-card { fill: #ffffff; }
      .db-text { fill: #111827; }
      .db-text-dim { fill: #6b7280; }
      .db-text-blue { fill: #2563eb; }
      .db-text-green { fill: #059669; }
      .db-text-purple { fill: #7c3aed; }
      .db-text-amber { fill: #d97706; }
      .db-separator { stroke: #e5e7eb; }
      .db-nav-active { fill: #f3f4f6; }
      .db-nav-icon { fill: #6b7280; }
      .db-nav-icon-active { fill: #d97706; }
      .db-chart-bg { fill: #ffffff; }
      .db-chart-grid { stroke: #e5e7eb; }
      .db-session-card { fill: #ffffff; }
      .db-badge-green { fill: #d1fae5; }
      .db-badge-red { fill: #fee2e2; }
      .db-badge-green-text { fill: #065f46; }
      .db-badge-red-text { fill: #991b1b; }
    }
  </style>

  <!-- Outer background -->
  <rect width="900" height="480" rx="12" ry="12" class="db-outer" filter="url(#shadow3)"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="180" height="480" rx="12" ry="12" class="db-sidebar"/>
  <rect x="12" y="0" width="168" height="480" class="db-sidebar"/>

  <!-- Sidebar header -->
  <text x="24" y="36" class="db-text" font-size="18" font-weight="700">FSB</text>
  <text x="60" y="36" class="db-text-dim" font-size="11">v9.0.2</text>

  <line x1="16" y1="52" x2="164" y2="52" class="db-separator" stroke-width="0.5"/>

  <!-- Nav items -->
  <!-- Dashboard (active) -->
  <rect x="12" y="64" width="156" height="36" rx="8" ry="8" class="db-nav-active"/>
  <!-- Grid icon -->
  <rect x="24" y="74" width="7" height="7" rx="1.5" class="db-nav-icon-active"/>
  <rect x="33" y="74" width="7" height="7" rx="1.5" class="db-nav-icon-active"/>
  <rect x="24" y="83" width="7" height="7" rx="1.5" class="db-nav-icon-active"/>
  <rect x="33" y="83" width="7" height="7" rx="1.5" class="db-nav-icon-active"/>
  <text x="50" y="87" class="db-text-amber" font-size="13" font-weight="600">Dashboard</text>

  <!-- Settings -->
  <!-- Gear icon (simple) -->
  <circle cx="31" cy="118" r="6" fill="none" stroke="#9ca3af" stroke-width="1.3"/>
  <circle cx="31" cy="118" r="2" class="db-nav-icon"/>
  <text x="50" y="122" class="db-text-dim" font-size="13">Settings</text>

  <!-- Memory -->
  <!-- Brain icon (simplified) -->
  <circle cx="31" cy="152" r="6" fill="none" stroke="#9ca3af" stroke-width="1.3"/>
  <path d="M28 152 q3 -4 6 0" fill="none" stroke="#9ca3af" stroke-width="1"/>
  <text x="50" y="156" class="db-text-dim" font-size="13">Memory</text>

  <!-- Agents -->
  <!-- Bot icon -->
  <rect x="25" y="178" width="12" height="10" rx="3" fill="none" stroke="#9ca3af" stroke-width="1.3"/>
  <circle cx="29" cy="183" r="1.5" class="db-nav-icon"/>
  <circle cx="33" cy="183" r="1.5" class="db-nav-icon"/>
  <text x="50" y="188" class="db-text-dim" font-size="13">Agents</text>

  <!-- Logs -->
  <!-- List icon -->
  <rect x="25" y="210" width="12" height="2" rx="1" class="db-nav-icon"/>
  <rect x="25" y="215" width="12" height="2" rx="1" class="db-nav-icon"/>
  <rect x="25" y="220" width="8" height="2" rx="1" class="db-nav-icon"/>
  <text x="50" y="220" class="db-text-dim" font-size="13">Logs</text>

  <!-- Sidebar separator -->
  <line x1="180" y1="0" x2="180" y2="480" class="db-separator" stroke-width="1"/>

  <!-- Main content area -->
  <!-- Page title -->
  <text x="204" y="36" class="db-text" font-size="20" font-weight="700">Dashboard</text>
  <text x="204" y="54" class="db-text-dim" font-size="12">Analytics and monitoring overview</text>

  <!-- Metric cards row -->
  <!-- Card 1: Total Sessions -->
  <rect x="204" y="72" width="162" height="80" rx="10" ry="10" fill="url(#cardGrad1)"/>
  <rect x="204" y="72" width="162" height="80" rx="10" ry="10" fill="none" stroke="#3b82f6" stroke-width="0.5" stroke-opacity="0.3"/>
  <!-- Icon circle -->
  <circle cx="228" cy="96" r="12" fill="#3b82f6" opacity="0.15"/>
  <rect x="223" y="92" width="10" height="8" rx="2" fill="none" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="224" y="126" class="db-text-dim" font-size="11">Total Sessions</text>
  <text x="224" y="144" class="db-text-blue" font-size="22" font-weight="700">142</text>

  <!-- Card 2: Success Rate -->
  <rect x="380" y="72" width="162" height="80" rx="10" ry="10" fill="url(#cardGrad2)"/>
  <rect x="380" y="72" width="162" height="80" rx="10" ry="10" fill="none" stroke="#10b981" stroke-width="0.5" stroke-opacity="0.3"/>
  <circle cx="404" cy="96" r="12" fill="#10b981" opacity="0.15"/>
  <path d="M399 96 l3 3 l6 -6" fill="none" stroke="#34d399" stroke-width="1.5" stroke-linecap="round"/>
  <text x="400" y="126" class="db-text-dim" font-size="11">Success Rate</text>
  <text x="400" y="144" class="db-text-green" font-size="22" font-weight="700">87%</text>

  <!-- Card 3: Tokens Used -->
  <rect x="556" y="72" width="162" height="80" rx="10" ry="10" fill="url(#cardGrad3)"/>
  <rect x="556" y="72" width="162" height="80" rx="10" ry="10" fill="none" stroke="#8b5cf6" stroke-width="0.5" stroke-opacity="0.3"/>
  <circle cx="580" cy="96" r="12" fill="#8b5cf6" opacity="0.15"/>
  <!-- Token/coin icon -->
  <circle cx="580" cy="96" r="5" fill="none" stroke="#a78bfa" stroke-width="1.3"/>
  <text x="578" y="100" font-size="7" fill="#a78bfa" font-weight="700" font-family="sans-serif">T</text>
  <text x="576" y="126" class="db-text-dim" font-size="11">Tokens Used</text>
  <text x="576" y="144" class="db-text-purple" font-size="22" font-weight="700">1.2M</text>

  <!-- Card 4: Total Cost -->
  <rect x="732" y="72" width="148" height="80" rx="10" ry="10" fill="url(#cardGrad4)"/>
  <rect x="732" y="72" width="148" height="80" rx="10" ry="10" fill="none" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.3"/>
  <circle cx="756" cy="96" r="12" fill="#f59e0b" opacity="0.15"/>
  <text x="752" y="100" font-size="11" fill="#fbbf24" font-weight="700" font-family="sans-serif">$</text>
  <text x="752" y="126" class="db-text-dim" font-size="11">Total Cost</text>
  <text x="752" y="144" class="db-text-amber" font-size="22" font-weight="700">$3.47</text>

  <!-- Chart section -->
  <rect x="204" y="168" width="676" height="180" rx="10" ry="10" class="db-chart-bg"/>

  <!-- Chart title -->
  <text x="224" y="192" class="db-text" font-size="14" font-weight="600">Usage Over Time</text>
  <text x="224" y="208" class="db-text-dim" font-size="11">Sessions per day -- last 30 days</text>

  <!-- Chart grid lines -->
  <line x1="244" y1="226" x2="856" y2="226" class="db-chart-grid" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="244" y1="256" x2="856" y2="256" class="db-chart-grid" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="244" y1="286" x2="856" y2="286" class="db-chart-grid" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="244" y1="316" x2="856" y2="316" class="db-chart-grid" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!-- Y-axis labels -->
  <text x="230" y="230" class="db-text-dim" font-size="9" text-anchor="end">12</text>
  <text x="230" y="260" class="db-text-dim" font-size="9" text-anchor="end">8</text>
  <text x="230" y="290" class="db-text-dim" font-size="9" text-anchor="end">4</text>
  <text x="230" y="320" class="db-text-dim" font-size="9" text-anchor="end">0</text>

  <!-- X-axis labels -->
  <text x="280" y="336" class="db-text-dim" font-size="9">Jan 22</text>
  <text x="440" y="336" class="db-text-dim" font-size="9">Feb 1</text>
  <text x="600" y="336" class="db-text-dim" font-size="9">Feb 10</text>
  <text x="780" y="336" class="db-text-dim" font-size="9">Feb 20</text>

  <!-- Chart area fill -->
  <path d="M260 306 L310 296 L360 300 L410 282 L460 270 L510 258 L560 264 L610 248 L660 240 L710 244 L760 232 L810 236 L840 228 L840 316 L260 316 Z" fill="url(#chartFill)"/>

  <!-- Chart line -->
  <path d="M260 306 L310 296 L360 300 L410 282 L460 270 L510 258 L560 264 L610 248 L660 240 L710 244 L760 232 L810 236 L840 228" fill="none" stroke="url(#chartLine)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data points -->
  <circle cx="260" cy="306" r="3" fill="#3b82f6"/>
  <circle cx="360" cy="300" r="3" fill="#3b82f6"/>
  <circle cx="460" cy="270" r="3" fill="#3b82f6"/>
  <circle cx="560" cy="264" r="3" fill="#3b82f6"/>
  <circle cx="660" cy="240" r="3" fill="#3b82f6"/>
  <circle cx="760" cy="232" r="3" fill="#3b82f6"/>
  <circle cx="840" cy="228" r="4" fill="#8b5cf6" stroke="#1f2937" stroke-width="2"/>

  <!-- Session history section -->
  <text x="204" y="374" class="db-text" font-size="14" font-weight="600">Recent Sessions</text>

  <!-- Session card 1 (completed) -->
  <rect x="204" y="388" width="330" height="76" rx="8" ry="8" class="db-session-card"/>
  <rect x="218" y="400" width="72" height="20" rx="10" ry="10" class="db-badge-green"/>
  <text x="228" y="414" class="db-badge-green-text" font-size="10" font-weight="600">Completed</text>
  <text x="300" y="414" class="db-text-dim" font-size="10">2 min ago</text>
  <text x="218" y="436" class="db-text" font-size="12">Search iPhone reviews on Google</text>
  <text x="218" y="454" class="db-text-dim" font-size="10">grok-4-1-fast -- 5 actions -- 0.8s avg -- $0.02</text>

  <!-- Session card 2 (failed) -->
  <rect x="550" y="388" width="330" height="76" rx="8" ry="8" class="db-session-card"/>
  <rect x="564" y="400" width="52" height="20" rx="10" ry="10" class="db-badge-red"/>
  <text x="572" y="414" class="db-badge-red-text" font-size="10" font-weight="600">Failed</text>
  <text x="626" y="414" class="db-text-dim" font-size="10">15 min ago</text>
  <text x="564" y="436" class="db-text" font-size="12">Fill out contact form on example.com</text>
  <text x="564" y="454" class="db-text-dim" font-size="10">gpt-4o -- 12 actions -- 1.2s avg -- $0.08</text>
</svg>