name: Publish MCP Server to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Verify shebang
        run: head -1 build/index.js | grep -q '#!/usr/bin/env node' || (echo "ERROR: shebang missing from build/index.js" && exit 1)

      - name: Verify pack contents
        run: |
          npm pack --dry-run 2>&1 | tee /tmp/pack-output.txt
          if grep -q 'src/' /tmp/pack-output.txt; then
            echo "ERROR: src/ files found in pack output"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
