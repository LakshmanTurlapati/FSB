<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>FSB</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Prerender-safe theme bootstrap: guard requires `typeof localStorage !== 'undefined'` (PITFALLS.md P1, D-20) -->
  <script>
    (function initShowcaseTheme() {
      if (typeof localStorage === 'undefined') return;
      if (typeof localStorage.getItem !== 'function') return;
      var saved = localStorage.getItem('fsb-showcase-theme');
      if (saved === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <link rel="icon" type="image/png" href="/assets/icon48.png">
  <!-- Organization JSON-LD (LD-01, D-10..D-12). Inherited by every prerendered route via index.html template. Payload is hand-authored single-line strict JSON; no field contains '<' so no \u003c escape pass is needed. Pattern: PITFALLS.md P4. Threat: T-LD-01 (XSS via JSON-LD injection). -->
  <script type="application/ld+json">{"@context":"https://schema.org","@type":"Organization","@id":"https://full-selfbrowsing.com/#org","name":"FSB","alternateName":"Full Self-Browsing","url":"https://full-selfbrowsing.com","logo":"https://full-selfbrowsing.com/assets/fsb_logo_dark.png","sameAs":["https://github.com/lakshmanturlapati/FSB","https://www.youtube.com/@parzival5707"]}</script>
</head>
<body>
  <app-root></app-root>
  <!-- CDN libraries for dashboard: QR code scanning and LZ-string decompression -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://unpkg.com/lz-string@1.5.0/libs/lz-string.min.js"></script>
  <!-- Dashboard runtime state helpers (preview surface, remote control, task recovery derivation) -->
  <script src="assets/dashboard-runtime-state.js"></script>
</body>
</html>
