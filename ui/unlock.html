<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Unlock FSB</title>
  <style>
    body {
      width: 350px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      margin: 0;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 10px;
      padding: 30px;
      color: #333;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    h1 {
      font-size: 24px;
      margin: 0 0 10px 0;
      color: #2c3e50;
      text-align: center;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
      text-align: center;
    }

    .icon {
      width: 60px;
      height: 60px;
      margin: 0 auto 20px;
      background: #667eea;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
    }

    .pin-input-container {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin: 20px 0;
    }

    .pin-digit {
      width: 44px;
      height: 52px;
      text-align: center;
      font-size: 22px;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      border: 2px solid #d0d0d0;
      border-radius: 8px;
      background: #fafafa;
      color: #333;
      transition: border-color 0.15s;
      -webkit-text-security: disc;
    }

    .pin-digit:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
    }

    .pin-digit.filled {
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #5a67d8;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .error {
      color: #e74c3c;
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
      display: none;
    }

    .setup-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
    }

    .setup-link a {
      color: #667eea;
      text-decoration: none;
    }

    .setup-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#128272;</div>
    <h1>Unlock Vault</h1>
    <p class="subtitle">Enter your PIN to unlock</p>

    <div id="pinContainer"></div>

    <button type="button" id="unlockBtn">Unlock</button>

    <div class="error" id="errorMsg"></div>

    <div class="setup-link">
      <a href="#" id="setupLink">First time? Run setup</a>
    </div>
  </div>

  <script src="pin-input.js"></script>
  <script src="unlock.js"></script>
</body>
</html>
